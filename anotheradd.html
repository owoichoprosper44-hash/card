<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart System</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 10px;
}

.cart {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    background-color: bisque;
}

.green {
    color: white;
    background-color: green;
    padding: 8px;
    border-radius: 8px;
    border: none;
}

.delete {
    background: red;
    border: none;
    border-radius: 8px;
    color: white;
}

button {
    cursor: pointer;
}

@media (max-width: 768px) {
    .cart {
        flex-direction: column;
        gap: 10px;
    }

    .green, .delete {
        width: 100%;
        padding: 10px;
    }
}
</style>
</head>

<body>

<h2>Products</h2>
<div id="app"></div>

<br>

<button onclick="resetCart()" style="padding:10px;background:black;color:white;border:none;border-radius:8px;">
RESET EVERYTHING
</button>

<h2>Live Cart</h2>
<div id="show"></div>

<h2>Total</h2>
<div id="total"></div>

<h2>Stored Cart (Database View)</h2>
<div id="local"></div>

<script>

// PRODUCTS
let products = [
    { id: 1, name: "Laptop", price: 500000 },
    { id: 2, name: "Phone", price: 200000 },
    { id: 3, name: "Headset", price: 25000 }
];

// LOAD FROM LOCALSTORAGE
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// DOM
let showEl = document.getElementById("show");
let totalEl = document.getElementById("total");
let localEl = document.getElementById("local");


// ================= PRODUCTS =================
function renderProducts() {
    let output = "";

    products.forEach(p => {
        output += `
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick="addToCart(${p.id})">Add to Cart</button>
            <hr>
        `;
    });

    document.getElementById("app").innerHTML = output;
}


// ================= ADD =================
function addToCart(id) {
    let product = products.find(p => p.id === id);
    let item = cart.find(p => p.id === id);

    if (item) {
        item.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }

    sync();
}


// ================= SHOW CART =================
function showCart() {
    showEl.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
        total += item.price * item.quantity;

        showEl.innerHTML += `
        <div class="cart">
            <p>${item.name}</p>
            <p>${item.quantity}</p>
            <p>${item.price * item.quantity}</p>

            <button class="green" onclick="increase(${item.id})">+</button>
            <button class="green" onclick="decrease(${item.id})">-</button>
            <button class="delete" onclick="removeItem(${item.id})">delete</button>
        </div>
        `;
    });

    totalEl.innerHTML = `<h3>Total: ${total}</h3>`;
}


// ================= DATABASE VIEW =================
function renderStored() {
    let stored = JSON.parse(localStorage.getItem("cart")) || [];

    let html = "";

    stored.forEach(item => {
        html += `
        <div class="cart">
            <p>${item.name}</p>
            <p>${item.quantity}</p>
            <p>${item.price * item.quantity}</p>
        </div>
        `;
    });

    localEl.innerHTML = html;
}


// ================= INCREASE =================
function increase(id) {
    let item = cart.find(p => p.id === id);
    item.quantity++;

    sync();
}


// ================= DECREASE =================
function decrease(id) {
    let item = cart.find(p => p.id === id);

    item.quantity--;

    if (item.quantity <= 0) {
        cart = cart.filter(p => p.id !== id);
    }

    sync();
}


// ================= DELETE =================
function removeItem(id) {
    cart = cart.filter(p => p.id !== id);
    sync();
}


// ================= RESET EVERYTHING =================
function resetCart() {
    let confirmReset = confirm("Are you sure you want to delete everything?");

    if (!confirmReset) return;

    cart = [];
    localStorage.removeItem("cart");

    sync();
}


// ================= SYNC =================
function sync() {
    localStorage.setItem("cart", JSON.stringify(cart));

    showCart();
    renderStored();
}


// INIT
renderProducts();
sync();

</script>

</body>
</html>
